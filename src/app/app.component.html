<!-- Dark Theme Toggle (Top Left) -->
<button (click)="toggleTheme()"
  class="fixed top-6 left-6 md:top-8 md:left-8 z-50 flex items-center justify-center w-10 h-10 md:w-12 md:h-12 bg-white/80 dark:bg-slate/80 backdrop-blur-md rounded-full shadow-lg border border-slate/10 text-slate transition-all duration-300 hover:scale-110 active:scale-95 cursor-pointer">
  <!-- Sun Icon -->
  @if (isDark) {
  <svg class="w-5 h-5 md:w-6 md:h-6 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
  </svg>
  }
  <!-- Moon Icon -->
  @if (!isDark) {
  <svg class="w-5 h-5 md:w-6 md:h-6 text-slate-800" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
  </svg>
  }
</button>

<!-- Fixed Top-Right Download Button -->
<a href="assets/resume/VISHWAJEET%20RESUME.pdf" download="Vishwajeet_Resume.pdf"
  class="fixed top-6 right-6 md:top-8 md:right-8 z-50 flex items-center gap-2 px-5 py-2.5 md:px-6 md:py-3 bg-white/80 backdrop-blur-md rounded-2xl shadow-lg border border-white/50 text-accent-green font-bold text-sm tracking-wide transition-all duration-300 hover:-translate-y-2 hover:shadow-[0_20px_40px_rgba(44,95,45,0.25)] hover:scale-105 active:scale-95 cursor-pointer group">
  <span>Resume</span>
  <svg class="w-5 h-5 transition-transform duration-300 group-hover:-translate-y-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
  </svg>
</a>
